<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="style.css">    
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.3.0/font/bootstrap-icons.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

        <!-- MAIN AUTH  -->
         <div class="auth-wrapper">
            <!-- Theme toggle -->
             <button class="theme-toggle" id="themeToggleBtn" onclick="toggleTheme()">
                <i class="bi bi-moon-fill"></i>
                <span id="themeLabel">Dark Mode</span>
             </button>

             <!-- auth card -->
              <div class="auth-card"></div>
              <!-- Logo -->
             <div class="auth-logo">
                <div class="logo-icon">
                    <i class="bi bi-person-circle"></i>
                </div>
                <h2 id="cardTitle">Welcome Back</h2>
                <p id="cardSubtitle">Sign in to your Account</p>
             </div>


             <!-- Login form -->

             <div class="form-panel active" id="loginForm">
                <!-- Email -->

            <div class="mb-field">
                <label for="loginEmail" class="form-label">Email Address</label>
                <input type="email" placeholder="Enter your email" class="form-control" id="loginEmail">
                <span class="error-msg" id="loginEmailErr">Please enter a valid email address</span>
            </div>
            <!-- Password -->
             <div class="mb-field">
                <label for="loginPassword" class="form-label">Password</label>
                <div class="input-password-wrapper">
                    <input type="password" placeholder="Enter ur password" class="form-control" id="loginPassword">
                    <!-- Show hide pasword -->
                     <button class="toggle-password" type="button" onclick="togglePassword('loginPassword,loginEye')" aria-label="Show or hide passoword">
                        <i class="bi bi-eye" id="loginEye"></i>
                     </button>
                </div>


                <span class="error-msg" id="loginPasswordErr"Password is required></span>
             </div>

             <!-- Submit -->

             <button class="btn-auth" onclick="handleLogin()">Login</button>

             <!-- Switch -->
              <div class="auth-divider"or></div>
              <p class="auth-swithc"></p>
             </div>
            </div>

</head>
<body>
    

     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
